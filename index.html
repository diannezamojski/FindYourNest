<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourNest | Corvallis Housing Hub</title>
    <style>
        :root { --osu: #D73F09; --black: #1A1A1A; --white: #FFFFFF; --gray: #F8F9FA; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; color: var(--black); line-height: 1.5; }
        
        /* Branding header inspired by your pitch graphics */
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: white; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--osu); }
        
        .hero { background: var(--osu); color: white; padding: 100px 5%; text-align: center; border-radius: 0 0 100px 0; }
        .hero h1 { font-size: 3rem; margin: 0; }
        
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        
        /* Corvallis Filter System */
        .filter-bar { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: -60px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .nest-card { border: 1px solid #eee; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .nest-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .nest-content { padding: 20px; }
        
        .review-badge { background: #E8F5E9; color: #2E7D32; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; }
        
        select, input, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .btn-primary { background: var(--black); color: white; border: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo">FindYourNest</div>
        <div><strong>Year 1:</strong> Corvallis/OSU Launch</div>
    </nav>

    <header class="hero">
        <h1>Your perfect place to rest.</h1>
        <p>Real reviews from verified OSU students. No hidden fees. No biased insights.</p>
    </header>

    <div class="container">
        <div class="filter-bar">
            <select><option>Neighborhood (Monroe, South C, etc)</option></select>
            <select><option>Dorm / Apt / House</option></select>
            <input type="text" placeholder="Price Range">
            <button class="btn-primary">Search
